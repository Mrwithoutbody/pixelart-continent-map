<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Mapa — Królestwa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- pixelart but readable; degrades to monospace offline (zero hard dependency) -->
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161d12; --ink2:#20281f; --line:#0d110a;
    --parch:#ece3c8; --parch2:#cdc097;
    --panel:#222c19; --panel2:#2c3a21; --bevel:#6f8a4a; --bevelDk:#3c4d28;
    --gold:#e6c14d; --green:#a7d04e; --red:#cf5b3f;
    --shadow:#0d110a;
    --pix:'Pixelify Sans','Trebuchet MS',monospace;
    --title:'Silkscreen','Pixelify Sans',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#10140e;font-family:var(--pix);
    color:var(--parch);-webkit-font-smoothing:none;font-smooth:never}
  canvas{display:block;image-rendering:pixelated;cursor:grab}
  canvas:active{cursor:grabbing}
  body.building canvas{cursor:crosshair}
  body[data-screen="start"] canvas,
  body[data-screen="gen"] canvas{cursor:default}

  /* ---- chunky pixel panel ---- */
  .panel{background:var(--panel);border:3px solid var(--line);
    box-shadow:0 0 0 3px var(--bevel), 0 0 0 6px var(--line), inset 0 0 0 2px var(--bevelDk), 0 8px 0 0 #0007;
    border-radius:2px;padding:16px 18px}
  .panel h1,.panel h2{font-family:var(--title);margin:0;letter-spacing:1px;
    color:var(--parch);text-shadow:0 2px 0 var(--line)}

  /* ---- pixel button ---- */
  .btn{font-family:var(--pix);font-weight:600;font-size:15px;cursor:pointer;color:var(--ink);
    background:var(--green);border:3px solid var(--line);border-radius:2px;
    padding:9px 16px;letter-spacing:.5px;text-shadow:0 1px 0 #ffffff55;
    box-shadow:inset 0 2px 0 #ffffff55, inset 0 -3px 0 #0006, 0 4px 0 var(--line);
    transition:transform .04s, box-shadow .04s}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(3px);box-shadow:inset 0 2px 0 #ffffff55, inset 0 -3px 0 #0006, 0 1px 0 var(--line)}
  .btn.ghost{background:var(--panel2);color:var(--parch)}
  .btn.sm{font-size:12px;padding:5px 10px;box-shadow:inset 0 2px 0 #ffffff44, inset 0 -3px 0 #0006, 0 3px 0 var(--line)}

  input.seed{font-family:var(--pix);font-size:15px;color:var(--parch);background:#141a10;
    border:3px solid var(--line);border-radius:2px;padding:8px 10px;width:160px;letter-spacing:1px;
    box-shadow:inset 0 2px 4px #0008;outline:none}
  input.seed:focus{border-color:var(--bevel)}
  input.seed::placeholder{color:#6f7a5e}

  /* ============ SCREEN OVERLAYS ============ */
  .screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:20;background:radial-gradient(120% 120% at 50% 30%, #0b0f0899 0%, #0b0f08dd 100%)}
  body[data-screen="start"] #screen-start{display:flex}
  body[data-screen="gen"]   #screen-gen{display:flex}

  /* ---- start screen ---- */
  #screen-start .card{width:min(440px,86vw);text-align:center}
  #screen-start h1{font-size:30px;line-height:1.25;margin-bottom:4px;color:var(--gold);text-shadow:0 3px 0 var(--line)}
  #screen-start .sub{font-size:14px;color:var(--parch2);margin-bottom:18px;line-height:1.5}
  #screen-start .row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:6px}
  #screen-start .big{display:block;width:100%;font-size:18px;padding:13px;margin-top:14px}
  #screen-start .hint{margin-top:16px;font-size:11px;color:#7e8a6a;line-height:1.7}
  #screen-start .crest{font-family:var(--title);font-size:34px;margin-bottom:6px}

  /* ---- generating screen ---- */
  #screen-gen .card{width:min(420px,86vw);text-align:center}
  #screen-gen h2{font-size:18px;color:var(--green);margin-bottom:16px}
  .bar{height:18px;background:#141a10;border:3px solid var(--line);border-radius:2px;
    box-shadow:inset 0 2px 4px #0008;overflow:hidden;margin:6px 0 12px}
  .bar > i{display:block;height:100%;width:0%;background:var(--green);
    box-shadow:inset 0 3px 0 #ffffff44, inset 0 -4px 0 #0005;transition:width .18s steps(8)}
  #gen-status{font-size:13px;color:var(--parch2);min-height:18px;letter-spacing:.5px}

  /* ============ GAME HUD ============ */
  #hud{position:fixed;top:12px;left:12px;z-index:10;max-width:300px;padding:11px 13px;
    font-size:12px;line-height:1.55}
  body:not([data-screen="game"]) #hud{display:none}
  #hud .ttl{font-family:var(--title);font-size:13px;color:var(--gold);letter-spacing:.5px;
    text-shadow:0 2px 0 var(--line);margin-bottom:6px}
  #hud .keys{color:var(--parch2);margin-bottom:8px}
  #hud .keys b{color:var(--green);font-weight:600}
  #hud .row{display:flex;gap:8px;align-items:center}
  #hud .seedbox{color:#8b9676;font-size:11px}
  #hud .seedbox b{color:var(--parch)}
  #hud .lyrs{margin:8px 0 2px;flex-wrap:wrap}
  #hud .lyrlbl{color:#8b9676;font-size:11px;align-self:center}
  #hud .lyr{background:var(--panel2);color:var(--parch2);font-size:11px;padding:4px 8px;
    box-shadow:inset 0 -2px 0 #0005, 0 2px 0 var(--line)}
  #hud .lyr.on{background:var(--green);color:var(--ink);box-shadow:inset 0 2px 0 #ffffff55, inset 0 -3px 0 #0006, 0 2px 0 var(--line)}

  /* build palette */
  #buildbar{position:fixed;left:12px;bottom:12px;z-index:14;width:200px;display:none;padding:9px 10px}
  body[data-screen="game"] #buildbar.open{display:block}
  #buildbar .bt{font-family:var(--title);font-size:12px;color:var(--gold);margin-bottom:7px;
    display:flex;justify-content:space-between}
  #buildbar .bt .x{cursor:pointer;color:var(--parch2)}
  #buildbar .grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  #buildbar .bopt{cursor:pointer;font-size:11px;color:var(--parch);background:var(--panel2);
    border:2px solid var(--line);border-radius:2px;padding:6px 7px;box-shadow:inset 0 -2px 0 #0005}
  #buildbar .bopt:hover{background:var(--green);color:var(--ink)}
  #buildbar .bopt .bcost{display:block;font-size:9px;color:#9aa888;margin-top:2px}
  #buildbar .bopt:hover .bcost{color:var(--ink)}
  #buildbar .hint{font-size:10px;color:#8b9676;margin-top:7px}

  /* toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(10px);z-index:30;
    background:var(--panel);border:3px solid var(--line);box-shadow:0 0 0 3px var(--bevel),0 4px 0 #0007;
    color:var(--parch);font-family:var(--pix);font-size:13px;padding:8px 14px;border-radius:2px;
    opacity:0;pointer-events:none;transition:opacity .15s,transform .15s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* exit-to-menu, top-right small */
  #toMenu{position:fixed;top:12px;right:12px;z-index:11}
  body:not([data-screen="game"]) #toMenu{display:none}
  /* shift exit button left when a city panel is open so they don't overlap */
  body.has-info #toMenu{right:262px}

  /* ============ CITY INFO PANEL ============ */
  #info{position:fixed;top:12px;right:12px;z-index:12;width:290px;display:none;
    font-size:12px;line-height:1.65;padding:0;overflow:hidden}
  body[data-screen="game"] #info.open{display:block}
  #info .tabs{display:flex;gap:4px;padding:7px 10px 0;background:var(--panel2);margin:0 -3px}
  #info .tab{cursor:pointer;font-size:11px;padding:5px 11px;color:var(--parch2);
    border:2px solid var(--line);border-bottom:0;border-radius:3px 3px 0 0;background:#1a2212}
  #info .tab.on{color:var(--gold);background:var(--panel);box-shadow:inset 0 2px 0 #ffffff22}
  #info .li.clk{cursor:pointer;border-radius:2px;padding:2px 5px;margin:0 -5px}
  #info .li.clk:hover{background:var(--panel2)}
  #info .li.back{color:var(--green);margin-bottom:4px}
  #info .ihead{display:flex;align-items:center;gap:7px;background:var(--panel2);
    margin:-3px -3px 0;padding:10px 12px;border-bottom:3px solid var(--line)}
  #info .ihead .nm{font-family:var(--title);font-size:13px;color:var(--gold);
    text-shadow:0 2px 0 var(--line);flex:1;line-height:1.3}
  #info .ihead .x{cursor:pointer;color:var(--parch2);font-weight:700;font-size:15px;
    padding:0 3px;line-height:1}
  #info .ihead .x:hover{color:var(--red)}
  #info .ibody{padding:11px 13px;max-height:calc(100vh - 110px);overflow-y:auto}
  #info .fac{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  #info .sw{width:11px;height:11px;border:2px solid var(--line);display:inline-block}
  #info .stat{display:flex;justify-content:space-between;gap:10px;padding:2px 0;
    border-bottom:1px dotted #ffffff14}
  #info .stat span:first-child{color:var(--parch2)}
  #info .stat b{color:var(--parch)}
  #info .sect{margin-top:9px;color:var(--green);font-size:11px;letter-spacing:.5px;
    text-transform:uppercase}
  #info .list{margin-top:3px}
  #info .li{display:flex;justify-content:space-between;padding:1px 0;color:var(--parch)}
  #info .li span:last-child{color:var(--gold);font-weight:600}
  #info .li.eco span:last-child{color:var(--parch2);font-weight:400}
  #info .port{color:var(--gold)}

  /* ============ CHRONICLE PANEL ============ */
  #chronicle{position:fixed;top:12px;left:12px;z-index:13;width:300px;max-height:calc(100vh - 24px);
    display:none;font-size:12px;line-height:1.6;padding:0;overflow:hidden}
  body[data-screen="game"] #chronicle.open{display:flex;flex-direction:column}
  #chronicle .ihead{display:flex;align-items:center;gap:7px;background:var(--panel2);
    margin:-3px -3px 0;padding:10px 12px;border-bottom:3px solid var(--line)}
  #chronicle .ihead .nm{font-family:var(--title);font-size:13px;color:var(--gold);
    text-shadow:0 2px 0 var(--line);flex:1}
  #chronicle .ihead .x{cursor:pointer;color:var(--parch2);font-weight:700;font-size:15px;padding:0 3px}
  #chronicle .ihead .x:hover{color:var(--red)}
  #chronicle .ibody{padding:10px 13px;overflow-y:auto}
  #chronicle .sect{margin-top:10px;color:var(--green);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  #chronicle .sect:first-child{margin-top:0}
  #chronicle .hrow{display:block;padding:5px 0;border-bottom:1px dotted #ffffff14}
  #chronicle .hrow b{color:var(--parch)}
  #chronicle .sw{width:11px;height:11px;border:2px solid var(--line);display:inline-block;vertical-align:-1px}
  #chronicle .dim{color:var(--parch2);font-size:11px}
  #chronicle .li{display:flex;justify-content:space-between;gap:8px;padding:2px 0;color:var(--parch)}
  #chronicle .li span:last-child{color:var(--gold);white-space:nowrap}
  #chronicle .ev{color:var(--parch2);padding:2px 0 2px 8px;border-left:2px solid var(--bevelDk);margin:3px 0}
  #chronicle .rel{padding:3px 0;border-bottom:1px dotted #ffffff14}
  #chronicle .cause{font-size:11px;padding-left:2px}
  #chronicle .tabs{display:flex;gap:4px;padding:7px 10px 0;background:var(--panel2);margin:0 -3px}
  #chronicle .tab{cursor:pointer;font-size:11px;padding:5px 10px;color:var(--parch2);
    border:2px solid var(--line);border-bottom:0;border-radius:3px 3px 0 0;background:#1a2212}
  #chronicle .tab.on{color:var(--gold);background:var(--panel);box-shadow:inset 0 2px 0 #ffffff22}
  #chronicle .graph{display:flex;justify-content:center;padding:4px 0 2px}
  #chronicle .legendrow{display:flex;flex-wrap:wrap;gap:8px;font-size:10px;justify-content:center;
    padding:2px 0 4px;border-bottom:1px dotted #ffffff14}
  #chronicle .intrig{border-left-color:#a84fd0;color:var(--parch)}
</style>
</head>
<body data-screen="start">

<canvas id="cv"></canvas>

<!-- ===== GAME HUD ===== -->
<div id="hud" class="panel">
  <div class="ttl">MAPA — KRÓLESTWA</div>
  <div class="keys"><b id="scenario">—</b><br>scroll = zoom · drag = przesuń · klik miasto = szczegóły</div>
  <div class="row lyrs">
    <span class="lyrlbl">warstwa:</span>
    <button class="btn sm lyr on" data-l="rody"   onclick="UI.setLayer('rody')">Rody</button>
    <button class="btn sm lyr"    data-l="gildie" onclick="UI.setLayer('gildie')">Gildie</button>
    <button class="btn sm lyr"    data-l="wiary"  onclick="UI.setLayer('wiary')">Wiary</button>
  </div>
  <div class="row">
    <button class="btn sm" onclick="UI.regenInGame()">↻ nowa mapa</button>
    <button class="btn sm ghost" onclick="UI.toggleChronicle()">📜 kroniki</button>
    <button class="btn sm ghost" onclick="UI.toggleBuild()">🔨 buduj</button>
  </div>
  <span class="seedbox">ziarno: <b id="seed">0</b></span>
</div>
<!-- build palette (filled by ui.js from BUILDABLE) -->
<div id="buildbar" class="panel"></div>
<!-- transient toast (build errors / confirmations) -->
<div id="toast"></div>
<button id="toMenu" class="btn sm ghost" onclick="UI.toStart()">☰ menu</button>

<!-- ===== CITY INFO PANEL (filled by map.js) ===== -->
<div id="info" class="panel"></div>

<!-- ===== CHRONICLE PANEL (houses + history, filled by ui.js) ===== -->
<div id="chronicle" class="panel"></div>

<!-- ===== START SCREEN ===== -->
<div id="screen-start" class="screen">
  <div class="card panel">
    <div class="crest">⚔</div>
    <h1>MAPA<br>KRÓLESTWA</h1>
    <div class="sub">proceduralny kontynent · frakcje · drogi i karawany handlowe</div>
    <button class="btn big" id="btnContinue" style="display:none" onclick="UI.continueGame()">⏵ KONTYNUUJ</button>
    <input class="seed" id="seedIn" placeholder="ziarno (puste = losowe)" maxlength="10">
    <button class="btn big" onclick="UI.newGame()">▶ NOWA GRA</button>
    <div class="row">
      <button class="btn sm ghost" onclick="UI.randomSeed()">🎲 losowe ziarno</button>
    </div>
    <div class="hint">scroll = zoom · drag = przesuń mapę<br>klik na mieście = szczegóły osady</div>
  </div>
</div>

<!-- ===== GENERATING SCREEN ===== -->
<div id="screen-gen" class="screen">
  <div class="card panel">
    <h2>GENEROWANIE ŚWIATA</h2>
    <div class="bar"><i id="gen-bar"></i></div>
    <div id="gen-status">…</div>
  </div>
</div>

<!-- modules: plain classic scripts (no build step); load order matters -->
<script src="engine/config.js"></script>
<script src="engine/math.js"></script>
<script src="sprites/core.js"></script>
<script src="sprites/buildings.js"></script>
<script src="sprites/terrain.js"></script>
<script src="sprites/units.js"></script>
<script src="worldgen/towns.js"></script>
<script src="chronicle/generate.js"></script>
<script src="worldgen/world.js"></script>
<script src="chronicle/panel.js"></script>
<script src="economy/production.js"></script>
<script src="render/render.js"></script>
<script src="ui/ui.js"></script>
</body>
</html>
