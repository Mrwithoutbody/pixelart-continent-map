<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#88a548;}canvas{image-rendering:pixelated;display:block}
</style></head><body>
<canvas id="t" width="560" height="360"></canvas>
<script src="sprites.js"></script>
<script>
buildSprites();
const ctx=document.getElementById('t').getContext('2d');ctx.imageSmoothingEnabled=false;
const Z=6; let x=10;
function draw(s,label,gx,gy){ const z=Z;
  ctx.drawImage(s.img,0,0,s.sw,s.sh, gx, gy-s.sh*z, s.sw*z, s.sh*z); }
let gx=20;
for(const m of SPR.mountains){ draw(m,'',gx,200); gx+=m.sw*Z+12; }
gx=20;
for(const h of SPR.hills){ draw(h,'',gx,300); gx+=h.sw*Z+12; }
for(const t of SPR.trees){ draw(t,'',gx,300); gx+=t.sw*Z+12; }
for(const b of SPR.bushes){ draw(b,'',gx,300); gx+=b.sw*Z+12; }
draw(SPR.house,'',gx,300); gx+=SPR.house.sw*Z+12;
draw(SPR.rocks[0],'',gx,300);
</script></body></html>
