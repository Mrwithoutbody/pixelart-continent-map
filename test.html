<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#88a548}canvas{image-rendering:pixelated}</style></head><body>
<canvas id="t" width="1200" height="320"></canvas>
<script src="sprites-core.js"></script><script src="sprites-buildings.js"></script><script src="sprites-terrain.js"></script><script src="sprites-units.js"></script><script>
buildSprites();const ctx=document.getElementById('t').getContext('2d');ctx.imageSmoothingEnabled=false;const Z=6;
// every sprite category on one sheet — buildings, terrain (incl. procedural pine/hill/mountain), units.
// each row baseline-aligned so anchor/oy regressions show up immediately.
const rows=[
  [SPR.hut,SPR.cottage,SPR.house,SPR.townhouse,SPR.manor,SPR.workshop,SPR.chapel,SPR.tower,SPR.windmill,SPR.market],
  [...SPR.trees,...SPR.bushes,...SPR.rocks],
  [...SPR.hills,...SPR.mountains,SPR.cart,SPR.ship],
];
let gy=10;for(const row of rows){let gx=20;const base=gy+Math.max(...row.map(s=>s.sh))*Z;
  for(const s of row){ctx.drawImage(s.img,0,0,s.sw,s.sh,gx,base-s.sh*Z,s.sw*Z,s.sh*Z);gx+=s.sw*Z+14;}
  gy=base+18;}
</script></body></html>
